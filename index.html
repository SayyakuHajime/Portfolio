<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=pages/home.html">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 3px solid rgba(29, 155, 240, 0.3);
            border-radius: 50%;
            border-top: 3px solid #1d9bf0;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Redirecting to portfolio...</p>
        <p style="font-size: 0.875rem; color: #71767b; margin-top: 0.5rem;">
            If you are not redirected, <a href="pages/home.html" style="color: #1d9bf0; text-decoration: none;">click here</a>
        </p>
    </div>
    <script>
        // Fallback redirect after 1 second if meta refresh doesn't work
        setTimeout(() => {
            window.location.href = 'pages/home.html';
        }, 1000);
    </script>
</body>
</html>
