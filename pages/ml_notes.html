<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting to Notes</title>
  <meta http-equiv="refresh" content="0; url=../notes/ml_midterm_notes.html" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .redirect-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .redirect-card {
      max-width: 520px;
      border: 1px solid var(--border-subtle);
      background: var(--bg-surface);
      border-radius: var(--r-md);
      padding: var(--sp-lg);
      text-align: center;
    }
    .redirect-card h1 {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 400;
      margin-bottom: var(--sp-sm);
    }
    .redirect-card p {
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: var(--sp-md);
    }
    .redirect-card a {
      color: var(--accent-gold);
      border-bottom: 1px solid var(--accent-gold);
    }
  </style>
</head>
<body>
  <div class="redirect-wrap">
    <article class="redirect-card">
      <h1>This note has moved</h1>
      <p>
        You are being redirected to the modular notes folder.
      </p>
      <p>
        If it does not redirect, open
        <a href="../notes/ml_midterm_notes.html">ML Midterm Notes</a>.
      </p>
    </article>
  </div>
  <script>
    window.location.replace('../notes/ml_midterm_notes.html');
  </script>
</body>
</html>
